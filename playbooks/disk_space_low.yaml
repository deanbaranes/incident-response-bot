# Playbook Strategy: Disk Space Triage
# Rationale: Disk exhaustion can cause silent failures across services.
# Capture visual state first, then pull per-mountpoint data for targeted RCA.

name: "Disk Space Low Playbook"

# List of automated actions for the bot to execute in sequential order
actions:
  # STEP 1: Visual Evidence
  - type: "capture_dashboard_screenshot"
    description: "Capture dashboard to preserve visual state of disk usage."

  # STEP 2: Data Enrichment
  - type: "fetch_metrics"
    target: "disk_usage"
    query: "100 - ((node_filesystem_avail_bytes{mountpoint='/',fstype!='tmpfs'} / node_filesystem_size_bytes{mountpoint='/',fstype!='tmpfs'}) * 100)"
    description: "Retrieve root filesystem usage percentage from Prometheus."

  # STEP 3: Root Cause Analysis
  - type: "ai_analysis"
    instruction: "Analyze disk usage levels. Identify top consumers likely causing the alert (logs, cores, data dirs). Recommend immediate cleanup actions and long-term capacity planning steps."

  # STEP 4: Final Reporting
  - type: "send_notification"
    channel: "email"
    recipient: "admin"
    description: "Dispatch the full RCA report including the screenshot to the SRE team."
