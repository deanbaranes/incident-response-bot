# Playbook Strategy: Visual-First Triage
# Rationale: Capturing the dashboard immediately to preserve visual evidence (Forensics) 
# before metrics normalize or the dashboard refreshes.

name: "High CPU Alert Playbook"

# List of automated actions for the bot to execute in sequential order
actions:
  - type: "capture_dashboard_screenshot"
    url: "https://dinbaranes.grafana.net/public-dashboards/6b201773936640628436787ab837de09"
    description: "Captures the dashboard for this specific alert"

# STEP 2: Data Enrichment
  - type: "fetch_metrics"
    target: "Overall CPU Usage"
    query: '100 - (avg by (instance) (irate(windows_cpu_time_total{mode="idle"}[2m])) * 100)'
    description: "Retrieve real-time numerical CPU data from Grafana Prometheus API for AI context."
  
  # STEP 3: Root Cause Analysis
  - type: "ai_analysis"
    instruction: "Analyze the relationship between the captured visual spike and the raw metrics. Provide a solution in Hebrew."

  # STEP 4: Final Reporting
  - type: "send_notification"
    channel: "email"
    recipient: "admin"
    description: "Dispatch the full RCA report including the screenshot to the SRE team."