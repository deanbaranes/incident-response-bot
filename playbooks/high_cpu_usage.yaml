# Playbook Name
name: "High CPU Alert Playbook"

# List of automated actions for the bot to execute
actions:
  - type: "fetch_metrics"
    target: "cpu_usage"
    description: "Retrieve real-time CPU data from Grafana API"

  - type: "ai_analysis"
    instruction: "Analyze why the CPU is high and provide a solution in Hebrew"

  - type: "send_notification"
    channel: "email"
    recipient: "admin"
